# استقرار Production (Cloud یا On-Premise):
#   docker compose -f docker-compose.deploy.yml up -d --build
# متغیرها را قبل از اجرا در .env یا محیط ست کنید: POSTGRES_PASSWORD

services:
  postgres:
    image: postgres:16
    container_name: bamacrm-db
    environment:
      POSTGRES_DB: bamacrm
      POSTGRES_USER: bamacrm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - bamacrm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bamacrm -d bamacrm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: src/Crm.Web/Dockerfile
    container_name: bamacrm-web
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=bamacrm;Username=bamacrm;Password=${POSTGRES_PASSWORD}"
    ports:
      - "8080:8080"
    volumes:
      - bamacrm_uploads:/app/wwwroot/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Backup خودکار روزانه Postgres — خروجی در ولوم bamacrm_backups (۱۴ نسخه آخر)
  backup:
    image: postgres:16
    container_name: bamacrm-backup
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - bamacrm_backups:/backups
    entrypoint: >
      bash -c 'while true; do
        pg_dump -h postgres -U bamacrm -d bamacrm -F c -f "/backups/bamacrm-$$(date +%Y%m%d-%H%M).dump" &&
        ls -1t /backups/bamacrm-*.dump 2>/dev/null | tail -n +15 | xargs -r rm --;
        sleep 86400;
      done'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  bamacrm_pgdata:
  bamacrm_uploads:
  bamacrm_backups:
