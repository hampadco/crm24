services:
  postgres:
    image: postgres:16
    container_name: crm24-postgres
    environment:
      POSTGRES_DB: crm24
      POSTGRES_USER: crm24
      POSTGRES_PASSWORD: crm24_dev
    ports:
      - "5432:5432"
    volumes:
      - crm24_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  crm24_pgdata:
