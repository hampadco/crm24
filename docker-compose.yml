services:
  postgres:
    image: postgres:16
    container_name: bamacrm-postgres
    environment:
      POSTGRES_DB: bamacrm
      POSTGRES_USER: bamacrm
      POSTGRES_PASSWORD: bamacrm_dev
    ports:
      - "5432:5432"
    volumes:
      - bamacrm_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  bamacrm_pgdata:
